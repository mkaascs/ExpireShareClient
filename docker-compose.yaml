services:
  frontend:
    build:
      context: ./
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - VITE_API_TARGET=${VITE_API_TARGET}
    ports:
      - "3000:3000"
    networks:
      - shared_network

networks:
  shared_network:
    external: true
    name: services-network      